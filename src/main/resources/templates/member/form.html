<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Form Member - Smart Laundry')}"></head>
<body class="app-shell bg-gray-50 text-gray-900" data-app-shell>
    <div class="flex h-screen overflow-hidden">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <div class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden">
            <div data-sidebar-overlay class="app-sidebar-overlay fixed inset-0 z-[9] hidden bg-gray-900/50 lg:hidden"></div>
            <div th:replace="~{layout/navbar :: navbar}"></div>
            <main>
                <div class="mx-auto max-w-[800px] p-4 md:p-6">
                    <section class="mb-6">
                        <div class="flex items-center gap-4">
                            <a th:href="@{/members}" class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-white text-slate-500 shadow-sm transition hover:bg-slate-50 hover:text-slate-900">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                            </a>
                            <div>
                                <p class="text-xs font-bold uppercase tracking-wider text-cyan-700">MEMBER</p>
                                <h1 class="text-2xl font-bold tracking-tight text-slate-950" th:text="${mode == 'edit' ? 'Edit Member' : 'Tambah Member'}">Form Member</h1>
                            </div>
                        </div>
                    </section>

                    <form th:action="@{${formAction}}" th:object="${memberForm}" method="post" class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div th:if="${#fields.hasAnyErrors()}" class="mb-6 rounded-xl border border-red-200 bg-red-50 p-4 text-sm text-red-600">
                            Mohon periksa kembali form Anda.
                        </div>

                        <div class="mb-6">
                            <h2 class="text-lg font-bold text-slate-900">Data Member</h2>
                        </div>

                        <div class="grid gap-6 sm:grid-cols-2">
                            <div>
                                <label for="nama" class="mb-2 block text-sm font-semibold text-slate-700">Nama Member</label>
                                <input id="nama" type="text" th:field="*{nama}" class="block w-full rounded-xl border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-cyan-600 sm:text-sm" placeholder="Contoh: Budi Santoso" required>
                                <p class="mt-2 text-sm text-red-600" th:if="${#fields.hasErrors('nama')}" th:errors="*{nama}"></p>
                            </div>

                            <div>
                                <label for="noTelp" class="mb-2 block text-sm font-semibold text-slate-700">Nomor Telepon</label>
                                <input id="noTelp" type="tel" th:field="*{noTelp}" class="block w-full rounded-xl border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-cyan-600 sm:text-sm" placeholder="Contoh: 08123456789" required>
                                <p class="mt-2 text-sm text-red-600" th:if="${#fields.hasErrors('noTelp')}" th:errors="*{noTelp}"></p>
                            </div>
                        </div>

                        <div class="mt-6 flex items-center gap-3">
                            <input type="checkbox" id="member" th:field="*{member}" class="h-5 w-5 rounded border-slate-300 text-cyan-600 focus:ring-cyan-600">
                            <label for="member" class="text-sm font-medium text-slate-700">Aktifkan Status Member</label>
                        </div>



                        <div class="mt-8 flex justify-end gap-3">
                            <a th:href="@{/members}" class="inline-flex items-center justify-center rounded-full bg-white px-5 py-2.5 text-sm font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50">Batal</a>
                            <button type="submit" class="inline-flex items-center justify-center rounded-full bg-cyan-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-cyan-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-600" th:text="${mode == 'edit' ? 'Simpan Perubahan' : 'Simpan Member'}">Simpan</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
