<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Form Staff - Smart Laundry')}"></head>
<body class="app-shell bg-gray-50 text-gray-900" data-app-shell>
    <div class="flex h-screen overflow-hidden">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <div class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden">
            <div data-sidebar-overlay class="app-sidebar-overlay fixed inset-0 z-[9] hidden bg-gray-900/50 lg:hidden"></div>
            <div th:replace="~{layout/navbar :: navbar}"></div>
            <main>
                <div class="mx-auto max-w-[800px] p-4 md:p-6">
                    <section class="mb-6">
                        <div class="flex items-center gap-4">
                            <a th:href="@{/admin/staff}" class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-white text-slate-500 shadow-sm transition hover:bg-slate-50 hover:text-slate-900">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                            </a>
                            <div>
                                <p class="text-xs font-bold uppercase tracking-wider text-cyan-700">ADMIN</p>
                                <h1 class="text-2xl font-bold tracking-tight text-slate-950" th:text="${mode == 'create' ? 'Tambah Staff' : 'Edit Staff'}">Form Staff</h1>
                            </div>
                        </div>
                    </section>

                    <form th:action="@{${formAction}}" th:object="${staffForm}" method="post" class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                        <div class="mb-6">
                            <h2 class="text-lg font-bold text-slate-900">Data Akun Staff</h2>
                        </div>

                        <div class="grid gap-6 sm:grid-cols-2">
                            <div>
                                <label for="nama" class="mb-2 block text-sm font-semibold text-slate-700">Nama</label>
                                <input id="nama" type="text" th:field="*{nama}" required class="block w-full rounded-xl border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-cyan-600 sm:text-sm">
                                <p class="mt-2 text-sm font-medium text-red-600" th:if="${#fields.hasErrors('nama')}" th:errors="*{nama}"></p>
                            </div>

                            <div>
                                <label for="username" class="mb-2 block text-sm font-semibold text-slate-700">Username</label>
                                <input id="username" type="text" th:field="*{username}" required class="block w-full rounded-xl border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-cyan-600 sm:text-sm">
                                <p class="mt-2 text-sm font-medium text-red-600" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
                            </div>
                        </div>

                        <div class="grid gap-6 sm:grid-cols-2 mt-6">
                            <div>
                                <label for="password" class="mb-2 block text-sm font-semibold text-slate-700">Password</label>
                                <input id="password" type="password" th:field="*{password}" th:required="${mode == 'create'}" class="block w-full rounded-xl border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-cyan-600 sm:text-sm">
                                <p class="mt-1 text-xs text-slate-500" th:if="${mode == 'edit'}">Kosongkan jika password tidak diganti.</p>
                                <p class="mt-2 text-sm font-medium text-red-600" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                            </div>

                            <div>
                                <label for="jumlahShift" class="mb-2 block text-sm font-semibold text-slate-700">Jumlah Shift</label>
                                <input id="jumlahShift" type="number" min="0" th:field="*{jumlahShift}" required class="block w-full rounded-xl border-0 py-2.5 px-3 text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-cyan-600 sm:text-sm">
                                <p class="mt-2 text-sm font-medium text-red-600" th:if="${#fields.hasErrors('jumlahShift')}" th:errors="*{jumlahShift}"></p>
                            </div>
                        </div>

                        <div class="mt-6 flex items-center gap-3">
                            <input type="checkbox" id="active" th:field="*{active}" class="h-5 w-5 rounded border-slate-300 text-cyan-600 focus:ring-cyan-600">
                            <label for="active" class="text-sm font-medium text-slate-700">Akun Aktif</label>
                        </div>

                        <div class="mt-8 flex justify-end gap-3">
                            <a th:href="@{/admin/staff}" class="inline-flex items-center justify-center rounded-full bg-white px-5 py-2.5 text-sm font-semibold text-slate-900 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50">Batal</a>
                            <button type="submit" class="inline-flex items-center justify-center rounded-full bg-cyan-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-cyan-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-600">Simpan Staff</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
