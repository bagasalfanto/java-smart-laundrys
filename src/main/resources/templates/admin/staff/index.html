<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Staff - Smart Laundry')}"></head>
<body class="app-shell bg-gray-50 text-gray-900" data-app-shell>
    <div class="flex h-screen overflow-hidden">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <div class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden">
            <div data-sidebar-overlay class="app-sidebar-overlay fixed inset-0 z-[9] hidden bg-gray-900/50 lg:hidden"></div>
            <div th:replace="~{layout/navbar :: navbar}"></div>
            <main>
                <div class="mx-auto max-w-[1536px] p-4 md:p-6">
            <section class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                <div>
                    <p class="text-xs font-bold uppercase tracking-wider text-cyan-700">ADMIN</p>
                    <h1 class="mt-1 text-3xl font-bold tracking-tight text-slate-950">Staff</h1>
                </div>
                <a th:href="@{/admin/staff/create}" class="inline-flex h-10 items-center justify-center rounded-lg bg-cyan-700 px-4 text-sm font-bold text-white shadow-sm transition hover:bg-cyan-800">Tambah Staff</a>
            </section>

            <!-- SweetAlert2 flash messages -->
            <div th:if="${success}" id="__swal_success" th:data-msg="${success}" style="display:none"></div>
            <div th:if="${error}" id="__swal_error" th:data-msg="${error}" style="display:none"></div>


            <section class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200 text-sm">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-500">Nama</th>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-500">Username</th>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-500">Shift</th>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-500">Status</th>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-500">Aksi</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 bg-white">
                            <tr th:each="staff : ${staffList}">
                                <td class="whitespace-nowrap px-4 py-4 font-semibold text-slate-900" th:text="${staff.nama}">Nama Staff</td>
                                <td class="whitespace-nowrap px-4 py-4 text-slate-600" th:text="${staff.user.username}">username</td>
                                <td class="whitespace-nowrap px-4 py-4 text-slate-600" th:text="${staff.jumlahShift}">0</td>
                                <td class="whitespace-nowrap px-4 py-4">
                                    <span class="inline-flex rounded-full bg-emerald-50 px-3 py-1 text-xs font-bold text-emerald-700" th:if="${staff.user.active}">Aktif</span>
                                    <span class="inline-flex rounded-full bg-slate-100 px-3 py-1 text-xs font-bold text-slate-500" th:unless="${staff.user.active}">Nonaktif</span>
                                </td>
                                <td class="px-4 py-4">
                                    <div class="flex flex-wrap gap-2">
                                        <a th:href="@{/admin/staff/{id}/edit(id=${staff.id})}" class="inline-flex h-9 items-center rounded-md border border-slate-200 bg-white px-3 text-xs font-bold text-slate-700 shadow-sm transition hover:bg-slate-50">Edit</a>

                                        <form th:if="${staff.user.active}" th:action="@{/admin/staff/{id}/deactivate(id=${staff.id})}" method="post"
                                              th:id="'deactivateForm-' + ${staff.id}">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button type="button"
                                                    class="inline-flex h-9 items-center rounded-md bg-amber-50 px-3 text-xs font-bold text-amber-700 transition hover:bg-amber-100"
                                                    th:data-id="${staff.id}" th:data-nama="${staff.nama}"
                                                    onclick="konfirmasiNonaktif(this.getAttribute('data-id'), this.getAttribute('data-nama'))">Nonaktifkan</button>
                                        </form>

                                        <form th:action="@{/admin/staff/{id}/delete(id=${staff.id})}" method="post"
                                              th:id="'deleteForm-' + ${staff.id}">
                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                            <button type="button"
                                                    class="inline-flex h-9 items-center rounded-md bg-red-600 px-3 text-xs font-bold text-white transition hover:bg-red-700"
                                                    th:data-id="${staff.id}" th:data-nama="${staff.nama}"
                                                    onclick="konfirmasiHapusStaff(this.getAttribute('data-id'), this.getAttribute('data-nama'))">Hapus</button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(staffList)}">
                                <td colspan="5" class="px-4 py-10 text-center text-sm text-slate-500">Belum ada data staff.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
                </div>
            </main>
        </div>
    </div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var elSuccess = document.getElementById('__swal_success');
        var elError = document.getElementById('__swal_error');
        if (elSuccess) {
            Swal.fire({ icon: 'success', title: 'Berhasil!', text: elSuccess.getAttribute('data-msg'), confirmButtonColor: '#0e7490', timer: 2500, timerProgressBar: true });
        }
        if (elError) {
            Swal.fire({ icon: 'error', title: 'Gagal!', text: elError.getAttribute('data-msg'), confirmButtonColor: '#0e7490' });
        }
    });

    function konfirmasiNonaktif(staffId, namaStaff) {
        Swal.fire({
            title: 'Nonaktifkan Staff?',
            html: 'Yakin ingin menonaktifkan staff <strong>' + namaStaff + '</strong>?<br>Staff tidak bisa login setelah dinonaktifkan.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d97706',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Ya, Nonaktifkan!',
            cancelButtonText: 'Batal'
        }).then(function(result) {
            if (result.isConfirmed) {
                document.getElementById('deactivateForm-' + staffId).submit();
            }
        });
    }

    function konfirmasiHapusStaff(staffId, namaStaff) {
        Swal.fire({
            title: 'Hapus Staff Permanen?',
            html: '<p>Kamu akan menghapus staff <strong>' + namaStaff + '</strong> secara permanen.</p><p class="mt-2 text-sm text-slate-500">Akun login staff ini akan ikut terhapus dan tidak dapat dipulihkan.</p>',
            icon: 'error',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Ya, Hapus Permanen!',
            cancelButtonText: 'Batal',
            focusCancel: true
        }).then(function(result) {
            if (result.isConfirmed) {
                document.getElementById('deleteForm-' + staffId).submit();
            }
        });
    }
</script>
</html>
