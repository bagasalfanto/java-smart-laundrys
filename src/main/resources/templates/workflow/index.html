<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Workflow Manager - Smart Laundry')}"></head>
<body class="app-shell bg-gray-50 text-gray-900" data-app-shell>
    <div class="flex h-screen overflow-hidden">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <div class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden">
            <div data-sidebar-overlay class="app-sidebar-overlay fixed inset-0 z-[9] hidden bg-gray-900/50 lg:hidden"></div>
            <div th:replace="~{layout/navbar :: navbar}"></div>
            <main>
                <div class="mx-auto max-w-[1200px] p-4 md:p-6">
                    <section class="mb-6">
                        <div class="flex items-center gap-4">
                            <div>
                                <h1 class="text-2xl font-bold tracking-tight text-slate-950">Prosess Pencucian</h1>
                                <p class="mt-1 text-sm text-slate-500">Kelola transisi status pencucian pesanan.</p>
                            </div>
                        </div>
                    </section>

                    <div th:if="${successMessage}" class="mb-6 rounded-xl border border-green-200 bg-green-50 p-4 text-sm text-green-700">
                        <span th:text="${successMessage}"></span>
                    </div>
                    <div th:if="${errorMessage}" class="mb-6 rounded-xl border border-red-200 bg-red-50 p-4 text-sm text-red-700">
                        <span th:text="${errorMessage}"></span>
                    </div>

                    <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
                        <!-- Card Workflow -->
                        <div th:each="order : ${orders}" class="flex flex-col rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:shadow-md">
                            <div class="p-5 flex-1">
                                <div class="flex items-center justify-between mb-3">
                                    <span class="text-xs font-semibold text-slate-500" th:text="${order.invoiceNumber}">INV-123</span>
                                    
                                    <!-- Badges Status -->
                                    <span th:if="${order.orderStatus.name() == 'ANTRIAN'}" class="inline-flex items-center rounded-md bg-gray-50 px-2 py-1 text-xs font-medium text-gray-600 ring-1 ring-inset ring-gray-500/10">Antrian</span>
                                    <span th:if="${order.orderStatus.name() == 'PROSES_CUCI'}" class="inline-flex items-center rounded-md bg-blue-50 px-2 py-1 text-xs font-medium text-blue-700 ring-1 ring-inset ring-blue-700/10">Proses Cuci</span>
                                    <span th:if="${order.orderStatus.name() == 'PROSES_SETRIKA'}" class="inline-flex items-center rounded-md bg-amber-50 px-2 py-1 text-xs font-medium text-amber-700 ring-1 ring-inset ring-amber-700/10">Proses Setrika</span>
                                    <span th:if="${order.orderStatus.name() == 'SELESAI'}" class="inline-flex items-center rounded-md bg-green-50 px-2 py-1 text-xs font-medium text-green-700 ring-1 ring-inset ring-green-600/20">Selesai</span>
                                </div>
                                
                                <h3 class="mb-1 font-bold text-slate-900" th:text="${order.pelanggan.nama}">Nama Customer</h3>
                                <div class="text-sm text-slate-600 mb-4">
                                    <span th:text="${order.layanan.namaPaket}">Layanan</span> 
                                    <span class="mx-1">•</span> 
                                    <span th:text="${order.berat + ' kg'}">Berat kg</span>
                                </div>
                            </div>

                            <div class="border-t border-slate-100 bg-slate-50 p-4 rounded-b-2xl">
                                <!-- Action Buttons for Status Transition -->
                                <form th:if="${order.orderStatus.name() == 'ANTRIAN'}" th:action="@{/workflow/{id}/status(id=${order.id})}" method="post" class="form-status-update">
                                    <input type="hidden" name="status" value="PROSES_CUCI" />
                                    <button type="submit" class="w-full inline-flex justify-center items-center rounded-xl bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600">
                                        Mulai Cuci
                                    </button>
                                </form>
                                
                                <form th:if="${order.orderStatus.name() == 'PROSES_CUCI'}" th:action="@{/workflow/{id}/status(id=${order.id})}" method="post" class="form-status-update">
                                    <input type="hidden" name="status" value="PROSES_SETRIKA" />
                                    <button type="submit" class="w-full inline-flex justify-center items-center rounded-xl bg-amber-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-amber-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-amber-600">
                                        Mulai Setrika
                                    </button>
                                </form>

                                <form th:if="${order.orderStatus.name() == 'PROSES_SETRIKA'}" th:action="@{/workflow/{id}/status(id=${order.id})}" method="post" class="form-status-update">
                                    <input type="hidden" name="status" value="SELESAI" />
                                    <button type="submit" class="w-full inline-flex justify-center items-center rounded-xl bg-green-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-green-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-green-600">
                                        Tandai Selesai
                                    </button>
                                </form>

                                <div th:if="${order.orderStatus.name() == 'SELESAI'}" class="w-full text-center py-2 text-sm font-medium text-slate-500">
                                    Pencucian Selesai
                                </div>
                            </div>
                        </div>
                        
                        <div th:if="${#lists.isEmpty(orders)}" class="col-span-full py-12 text-center border-2 border-dashed border-slate-200 rounded-2xl">
                            <h3 class="text-sm font-medium text-slate-900">Belum ada pesanan</h3>
                            <p class="mt-1 text-sm text-slate-500">Pesanan yang dibuat akan muncul di sini.</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const statusForms = document.querySelectorAll('.form-status-update');
        
        statusForms.forEach(form => {
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const btn = this.querySelector('button[type="submit"]');
                const actionName = btn.innerText.trim();
                
                Swal.fire({
                    title: 'Konfirmasi Perubahan Status',
                    text: `Apakah Anda yakin ingin melakukan "${actionName}" pada pesanan ini?`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#0891b2', // cyan-600
                    cancelButtonColor: '#cbd5e1', // slate-300
                    confirmButtonText: 'Ya, Lanjutkan',
                    cancelButtonText: 'Batal'
                }).then((result) => {
                    if (result.isConfirmed) {
                        this.submit();
                    }
                });
            });
        });
    });
</script>
</html>
