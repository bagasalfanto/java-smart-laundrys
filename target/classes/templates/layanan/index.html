<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Service & Catalog Manager - Smart Laundry')}"></head>
<body class="app-shell bg-gray-50 text-gray-900" data-app-shell>
    <div class="flex h-screen overflow-hidden">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <div class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden">
            <div data-sidebar-overlay class="app-sidebar-overlay fixed inset-0 z-[9] hidden bg-gray-900/50 lg:hidden"></div>
            <div th:replace="~{layout/navbar :: navbar}"></div>
            <main>
                <div class="mx-auto max-w-[1536px] p-4 md:p-6">
                    <section class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                        <div>
                            <p class="text-xs font-bold uppercase tracking-wider text-cyan-700" th:text="${role}">ROLE</p>
                            <h1 class="mt-1 text-3xl font-bold tracking-tight text-slate-950">Service & Catalog Manager</h1>
                            <p class="mt-2 text-sm text-slate-500">Kelola paket laundry dan estimasi harga.</p>
                        </div>
                        <a th:href="@{/layanan/create}" class="inline-flex h-10 items-center justify-center rounded-lg bg-cyan-700 px-4 text-sm font-bold text-white shadow-sm transition hover:bg-cyan-800">Tambah Layanan</a>
                    </section>

                    <div th:if="${success}" id="__swal_success" th:data-msg="${success}" style="display:none"></div>
                    <div th:if="${error}" id="__swal_error" th:data-msg="${error}" style="display:none"></div>

                    <div class="grid gap-6">
                        
                        <div class="flex flex-col gap-6">
                            
                            <article class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
                                <div class="flex items-center justify-between mb-4">
                                    <div>
                                        <h2 class="text-xl font-bold text-slate-950">Daftar Paket Layanan</h2>
                                        <p class="text-sm text-slate-500">Daftar katalog harga layanan laundry.</p>
                                    </div>
                                </div>
                                
                                <div class="overflow-x-auto rounded-xl border border-slate-200">
                                    <table class="w-full text-left text-sm">
                                        <thead class="bg-slate-50 text-xs uppercase text-slate-500">
                                            <tr>
                                                <th class="px-4 py-3 font-medium">ID Layanan</th>
                                                <th class="px-4 py-3 font-medium">Nama Paket</th>
                                                <th class="px-4 py-3 font-medium">Harga/Kg</th>
                                                <th class="px-4 py-3 font-medium">Estimasi Waktu</th>
                                                <th class="px-4 py-3 font-medium text-right">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-slate-200">
                                            <tr th:each="lay : ${layananList}" class="hover:bg-slate-50">
                                                <td class="px-4 py-3 font-medium text-slate-900" th:text="${lay.id}"></td>
                                                <td class="px-4 py-3" th:text="${lay.namaPaket}"></td>
                                                <td class="px-4 py-3 text-cyan-700 font-semibold" th:text="'Rp ' + ${#numbers.formatDecimal(lay.hargaPerKg, 0, 'COMMA', 0, 'POINT')}"></td>
                                                <td class="px-4 py-3" th:text="${lay.estimasiWaktu} + ' Hari'"></td>
                                                <td class="px-4 py-3 text-right">
                                                    <div class="flex justify-end gap-2">
                                                        <a th:href="@{/layanan/{id}/edit(id=${lay.id})}" 
                                                                class="rounded-lg bg-amber-50 px-3 py-1.5 text-xs font-semibold text-amber-700 hover:bg-amber-100">
                                                            Edit
                                                        </a>
                                                        <form th:action="@{/layanan/delete}" method="post" class="inline" th:id="'deleteForm-' + ${lay.id}">
                                                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                                            <input type="hidden" name="id" th:value="${lay.id}">
                                                            <button type="button" 
                                                                class="rounded-lg bg-rose-50 px-3 py-1.5 text-xs font-semibold text-rose-700 hover:bg-rose-100"
                                                                th:data-id="${lay.id}" th:data-nama="${lay.namaPaket}"
                                                                onclick="konfirmasiHapus(this.getAttribute('data-id'), this.getAttribute('data-nama'))">
                                                                Hapus
                                                            </button>
                                                        </form>
                                                    </div>
                                                </td>
                                            </tr>
                                            <tr th:if="${#lists.isEmpty(layananList)}">
                                                <td colspan="5" class="px-4 py-8 text-center text-slate-500">Tidak ada data paket layanan.</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </article>


                        </div>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            var elSuccess = document.getElementById('__swal_success');
            var elError = document.getElementById('__swal_error');
            if (elSuccess) {
                Swal.fire({ icon: 'success', title: 'Berhasil!', text: elSuccess.getAttribute('data-msg'), confirmButtonColor: '#0e7490', timer: 2500, timerProgressBar: true });
            }
            if (elError) {
                Swal.fire({ icon: 'error', title: 'Gagal!', text: elError.getAttribute('data-msg'), confirmButtonColor: '#0e7490' });
            }
        });

        function konfirmasiHapus(idLayanan, namaPaket) {
            Swal.fire({
                title: 'Hapus Paket Layanan?',
                html: 'Yakin ingin menghapus paket <strong>' + namaPaket + '</strong>?<br>Tindakan ini tidak bisa dibatalkan.',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#dc2626',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Ya, Hapus!',
                cancelButtonText: 'Batal'
            }).then(function(result) {
                if (result.isConfirmed) {
                    document.getElementById('deleteForm-' + idLayanan).submit();
                }
            });
        }


    </script>
</body>
</html>
