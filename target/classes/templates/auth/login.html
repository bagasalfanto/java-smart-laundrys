<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Login - Smart Laundry')}"></head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="grid min-h-screen place-items-center px-4 py-10">
        <section class="w-full max-w-md rounded-xl border border-slate-200 bg-white p-8 shadow-xl shadow-slate-200/80">
            <div class="mb-8 flex items-center gap-4">
                <div class="flex h-12 w-12 items-center justify-center rounded-xl bg-cyan-700 text-base font-bold text-white shadow-sm">SL</div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-slate-950">Smart Laundry</h1>
                    <p class="mt-1 text-sm text-slate-500">Masuk sebagai Admin atau Staff.</p>
                </div>
            </div>

            <!-- SweetAlert2 otomatis tampil berdasarkan parameter URL -->
            <div th:if="${param.error}" id="__swal_error" style="display:none"></div>
            <div th:if="${param.logout}" id="__swal_logout" style="display:none"></div>
            <div th:if="${param.expired}" id="__swal_expired" style="display:none"></div>


            <form th:action="@{/login}" method="post" class="grid gap-4">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="grid gap-2">
                    <label for="username" class="text-sm font-semibold text-slate-700">Username</label>
                    <input id="username" name="username" type="text" autocomplete="username" required autofocus class="h-11 rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-cyan-700 focus:ring-4 focus:ring-cyan-100">
                </div>

                <div class="grid gap-2">
                    <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required class="h-11 rounded-lg border border-slate-300 bg-white px-3 text-sm text-slate-950 outline-none transition focus:border-cyan-700 focus:ring-4 focus:ring-cyan-100">
                </div>

                <button type="submit" class="mt-2 inline-flex h-11 items-center justify-center rounded-lg bg-cyan-700 px-4 text-sm font-bold text-white shadow-sm transition hover:bg-cyan-800 focus:outline-none focus:ring-4 focus:ring-cyan-100">Login</button>
            </form>
        </section>
    </main>
</body>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        if (document.getElementById('__swal_error')) {
            Swal.fire({
                icon: 'error',
                title: 'Login Gagal',
                text: 'Username atau password yang kamu masukkan salah.',
                confirmButtonColor: '#0e7490',
                confirmButtonText: 'Coba Lagi'
            });
        }
        if (document.getElementById('__swal_logout')) {
            Swal.fire({
                icon: 'success',
                title: 'Logout Berhasil',
                text: 'Kamu telah berhasil keluar dari sistem.',
                confirmButtonColor: '#0e7490',
                timer: 2500,
                timerProgressBar: true
            });
        }
        if (document.getElementById('__swal_expired')) {
            Swal.fire({
                icon: 'warning',
                title: 'Sesi Berakhir',
                text: 'Sesi kamu telah berakhir. Silakan login kembali.',
                confirmButtonColor: '#0e7490'
            });
        }
    });
</script>
</html>
