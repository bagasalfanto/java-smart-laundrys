<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Summary Report - Smart Laundry')}"></head>
<body class="app-shell bg-gray-50 text-gray-900" data-app-shell>
    <div class="flex h-screen overflow-hidden">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <div class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden">
            <div data-sidebar-overlay class="app-sidebar-overlay fixed inset-0 z-[9] hidden bg-gray-900/50 lg:hidden"></div>
            <div th:replace="~{layout/navbar :: navbar}"></div>
            <main>
                <div class="mx-auto max-w-[1000px] p-4 md:p-6">
                    <section class="mb-6">
                        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                            <div>
                                <h1 class="text-2xl font-bold tracking-tight text-slate-950">Summary Report</h1>
                                <p class="mt-1 text-sm text-slate-500">Rekap pendapatan harian laundry.</p>
                            </div>
                            <form th:action="@{/reports/generate}" method="post">
                                <button type="submit" class="inline-flex w-full sm:w-auto items-center justify-center rounded-full bg-cyan-600 px-5 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-cyan-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-cyan-600 transition">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="mr-2 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                                    Generate Laporan Hari Ini
                                </button>
                            </form>
                        </div>
                    </section>

                    <div th:if="${successMessage}" class="mb-6 rounded-xl border border-green-200 bg-green-50 p-4 text-sm text-green-600">
                        <span th:text="${successMessage}"></span>
                    </div>

                    <div class="grid gap-4">
                        <div th:each="report : ${reports}" class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm flex flex-col sm:flex-row sm:items-center justify-between gap-4 transition hover:shadow-md">
                            <div>
                                <h2 class="text-lg font-bold text-slate-900" th:text="${report.periode}"></h2>
                                <p class="mt-1 text-sm font-medium text-emerald-600" th:text="'Total Pendapatan: Rp ' + ${#numbers.formatDecimal(report.totalPendapatan, 0, 'COMMA', 0, 'POINT')}"></p>
                                <p class="text-xs text-slate-500 mt-2" th:text="'Digenerate pada: ' + ${#temporals.format(report.createdAt, 'dd-MM-yyyy HH:mm')}"></p>
                            </div>
                            <form th:action="@{/reports/export}" method="post" class="shrink-0">
                                <input type="hidden" name="id" th:value="${report.id}">
                                <button type="submit" class="inline-flex w-full sm:w-auto items-center justify-center rounded-lg border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 shadow-sm hover:bg-slate-50 transition">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="mr-2 h-4 w-4 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                                    Export ke PDF
                                </button>
                            </form>
                        </div>

                        <div th:if="${#lists.isEmpty(reports)}" class="rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-12 text-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto h-12 w-12 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                            <h3 class="mt-2 text-sm font-semibold text-slate-900">Tidak ada laporan</h3>
                            <p class="mt-1 text-sm text-slate-500">Belum ada laporan yang digenerate untuk ditampilkan.</p>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
