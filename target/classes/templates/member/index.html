<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Member - Smart Laundry')}"></head>
<body class="app-shell bg-gray-50 text-gray-900" data-app-shell>
    <div class="flex h-screen overflow-hidden">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <div class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden">
            <div data-sidebar-overlay class="app-sidebar-overlay fixed inset-0 z-[9] hidden bg-gray-900/50 lg:hidden"></div>
            <div th:replace="~{layout/navbar :: navbar}"></div>
            <main>
                <div class="mx-auto max-w-[1536px] p-4 md:p-6">
            <section class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                <div>
                    <p class="text-xs font-bold uppercase tracking-wider text-cyan-700" th:text="${role}">ROLE</p>
                    <h1 class="mt-1 text-3xl font-bold tracking-tight text-slate-950">Member</h1>
                </div>
                <a th:href="@{/members/create}" class="inline-flex h-10 items-center justify-center rounded-lg bg-cyan-700 px-4 text-sm font-bold text-white shadow-sm transition hover:bg-cyan-800">Tambah Member</a>
            </section>

            <!-- SweetAlert2 flash messages -->
            <div th:if="${success}" id="__swal_success" th:data-msg="${success}" style="display:none"></div>
            <div th:if="${error}" id="__swal_error" th:data-msg="${error}" style="display:none"></div>


            <div class="mb-4">
                <form th:action="@{/members}" method="get" class="flex w-full max-w-sm items-center gap-2">
                    <input type="text" name="search" th:value="${search}" placeholder="Cari nama atau no telp..." class="w-full rounded-lg border border-slate-200 px-4 py-2.5 text-sm focus:border-cyan-500 focus:outline-none focus:ring-1 focus:ring-cyan-500 shadow-sm">
                    <button type="submit" class="rounded-lg bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-800 shadow-sm transition-colors">Cari</button>
                    <a th:if="${search != null and !search.isEmpty()}" th:href="@{/members}" class="rounded-lg border border-slate-200 bg-white px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-slate-50 shadow-sm transition-colors" title="Reset">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </a>
                </form>
            </div>

            <section class="overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200 text-sm">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-500">Nama</th>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-500">No. Telepon</th>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-500">Member</th>
                                <th class="px-4 py-3 text-left text-xs font-bold uppercase tracking-wider text-slate-500">Aksi</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 bg-white">
                            <tr th:each="member : ${members}">
                                <td class="whitespace-nowrap px-4 py-4 font-semibold text-slate-900" th:text="${member.nama}">Nama Member</td>
                                <td class="whitespace-nowrap px-4 py-4 text-slate-600" th:text="${member.noTelp}">0800000000</td>
                                <td class="whitespace-nowrap px-4 py-4">
                                    <span class="inline-flex rounded-full bg-emerald-50 px-3 py-1 text-xs font-bold text-emerald-700" th:if="${member.member}">Ya</span>
                                    <span class="inline-flex rounded-full bg-slate-100 px-3 py-1 text-xs font-bold text-slate-500" th:unless="${member.member}">Tidak</span>
                                </td>
                                <td class="px-4 py-4">
                                    <div class="flex flex-wrap gap-2">
                                    <a th:href="@{/members/{id}/edit(id=${member.id})}" class="inline-flex h-9 items-center rounded-md border border-slate-200 bg-white px-3 text-xs font-bold text-slate-700 shadow-sm transition hover:bg-slate-50">Edit</a>
                                    <form th:action="@{/members/{id}/delete(id=${member.id})}" method="post"
                                          th:id="'deleteForm-' + ${member.id}">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                        <button type="button"
                                                class="inline-flex h-9 items-center rounded-md bg-red-50 px-3 text-xs font-bold text-red-700 transition hover:bg-red-100"
                                                th:data-id="${member.id}" th:data-nama="${member.nama}"
                                                onclick="konfirmasiHapusMember(this.getAttribute('data-id'), this.getAttribute('data-nama'))">Hapus</button>
                                    </form>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(members)}">
                                <td colspan="4" class="px-4 py-10 text-center text-sm text-slate-500">Belum ada data member.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
                </div>
            </main>
        </div>
    </div>
</body>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        var elSuccess = document.getElementById('__swal_success');
        var elError = document.getElementById('__swal_error');
        if (elSuccess) {
            Swal.fire({ icon: 'success', title: 'Berhasil!', text: elSuccess.getAttribute('data-msg'), confirmButtonColor: '#0e7490', timer: 2500, timerProgressBar: true });
        }
        if (elError) {
            Swal.fire({ icon: 'error', title: 'Gagal!', text: elError.getAttribute('data-msg'), confirmButtonColor: '#0e7490' });
        }
    });

    function konfirmasiHapusMember(memberId, namaMember) {
        Swal.fire({
            title: 'Hapus Member?',
            html: 'Yakin ingin menghapus member <strong>' + namaMember + '</strong>?<br>Data member akan dihapus permanen.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Ya, Hapus!',
            cancelButtonText: 'Batal'
        }).then(function(result) {
            if (result.isConfirmed) {
                document.getElementById('deleteForm-' + memberId).submit();
            }
        });
    }
</script>
</html>
