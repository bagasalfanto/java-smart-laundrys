<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/base :: head('Riwayat Login - Smart Laundry')}"></head>
<body class="app-shell bg-gray-50 text-gray-900" data-app-shell>
    <div class="flex h-screen overflow-hidden">
        <div th:replace="~{layout/sidebar :: sidebar}"></div>
        <div class="relative flex flex-1 flex-col overflow-y-auto overflow-x-hidden">
            <div data-sidebar-overlay class="app-sidebar-overlay fixed inset-0 z-[9] hidden bg-gray-900/50 lg:hidden"></div>
            <div th:replace="~{layout/navbar :: navbar}"></div>
            <main>
                <div class="mx-auto max-w-[1536px] p-4 md:p-6">
                    
                    <section class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
                        <div>
                            <p class="text-xs font-bold uppercase tracking-wider text-cyan-700">Admin</p>
                            <h1 class="mt-1 text-3xl font-bold tracking-tight text-slate-950">Activity Logs</h1>
                            <p class="mt-2 text-sm text-slate-500">Riwayat aktivitas login pada sistem.</p>
                        </div>
                    </section>

                    <section class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-sm text-slate-600">
                                <thead class="border-b border-slate-200 bg-slate-50 text-xs font-semibold uppercase text-slate-500">
                                    <tr>
                                        <th scope="col" class="px-6 py-4">Waktu</th>
                                        <th scope="col" class="px-6 py-4">Username</th>
                                        <th scope="col" class="px-6 py-4">Role</th>
                                        <th scope="col" class="px-6 py-4">IP Address</th>
                                        <th scope="col" class="px-6 py-4">Aktivitas</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-slate-200">
                                    <tr th:each="log : ${logs}" class="hover:bg-slate-50/50 transition">
                                        <td class="whitespace-nowrap px-6 py-4 font-medium text-slate-900" 
                                            th:text="${#temporals.format(log.createdAt, 'dd-MM-yyyy HH:mm:ss')}">
                                            01-01-2026 12:00:00
                                        </td>
                                        <td class="whitespace-nowrap px-6 py-4 font-medium text-slate-900" th:text="${log.user.username}">admin</td>
                                        <td class="whitespace-nowrap px-6 py-4">
                                            <span th:if="${log.user.role.name() == 'ADMIN'}" class="inline-flex rounded-full bg-indigo-50 px-2 py-1 text-xs font-bold text-indigo-700 ring-1 ring-inset ring-indigo-700/10">ADMIN</span>
                                            <span th:if="${log.user.role.name() == 'STAFF'}" class="inline-flex rounded-full bg-cyan-50 px-2 py-1 text-xs font-bold text-cyan-700 ring-1 ring-inset ring-cyan-700/10">STAFF</span>
                                        </td>
                                        <td class="whitespace-nowrap px-6 py-4 font-mono text-xs text-slate-500" th:text="${log.ipAddress != null ? log.ipAddress : '-'}">127.0.0.1</td>
                                        <td class="px-6 py-4">
                                            <span class="inline-flex items-center gap-1.5 rounded-full bg-emerald-50 px-2 py-1 text-xs font-semibold text-emerald-700 ring-1 ring-inset ring-emerald-600/20">
                                                <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
                                                <span th:text="${log.activity}">Login Berhasil</span>
                                            </span>
                                        </td>
                                    </tr>
                                    <tr th:if="${logs.empty}">
                                        <td colspan="5" class="px-6 py-8 text-center text-slate-500">
                                            Belum ada riwayat aktivitas yang tercatat.
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </section>

                </div>
            </main>
        </div>
    </div>
</body>
</html>
